<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MindMetric | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">MindMetric</a>
            <div class="ms-auto d-flex align-items-center">
                <a class="nav-link px-3 active" href="{{ url_for('dashboard') }}">Dashboard</a>
                <span class="ms-3 fw-bold text-dark">Jeremiah</span>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-4">
                    <h5 class="fw-bold mb-3">Log Your Mood</h5>
                    <select class="form-select mb-3" id="moodScore">
                        <option value="5">🔥 Great</option>
                        <option value="4">😊 Good</option>
                        <option value="3">😐 Neutral</option>
                        <option value="2">☹️ Bad</option>
                        <option value="1">😫 Terrible</option>
                    </select>
                    <textarea class="form-control mb-3" id="thoughtText" rows="3" placeholder="What happened today?"></textarea>
                    <button class="btn btn-primary w-100" onclick="testLog()">Save Entry</button>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-4 text-center">
                    <h5 class="fw-bold mb-4">Your Emotional Trend</h5>
                    <div class="chart-placeholder"><p class="text-muted">[ Chart.js Logic Goes Here ]</p></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function testLog() {
            const score = document.getElementById('moodScore').value;
            const thought = document.getElementById('thoughtText').value;

            try {
                const response = await fetch('http://127.0.0.1:5000/api/log_mood', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id: "Jeremiah", mood_score: parseInt(score), thought_text: thought })
                });

                const result = await response.json();
                if (result.status === "success") {
                    alert("Success! Entry saved to database.");
                    document.getElementById('thoughtText').value = '';
                } else { alert("Database Error."); }
            } catch (error) { alert("Could not connect to Flask server."); }
        }
    </script>
</body>
</html>
