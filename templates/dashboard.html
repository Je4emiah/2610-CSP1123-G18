{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4 shadow-sm border-0">
                <h5 class="fw-bold mb-3">Log Your Mood</h5>
                <select class="form-select mb-3" id="moodScore">
                    <option value="5">🔥 Great</option>
                    <option value="4">😊 Good</option>
                    <option value="3" selected>😐 Neutral</option>
                    <option value="2">☹️ Bad</option>
                    <option value="1">😫 Terrible</option>
                </select>
                <textarea class="form-control mb-3" id="thoughtText" rows="3"
                    placeholder="What happened today?"></textarea>
                <button class="btn btn-primary w-100 rounded-pill" onclick="saveMood()">Save Entry</button>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card p-4 text-center shadow-sm border-0 h-100">
                <h5 class="fw-bold mb-4">Your Emotional Trend</h5>
                <div class="card p-4 text-center shadow-sm border-0 h-100">
                    <h5 class="fw-bold mb-4">Your Emotional Trend</h5>
                    <div style="position: relative; height:300px; width:100%">
                        <canvas id="moodChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
    // 1. The function to fetch data and draw the chart
    async function loadChart() {
        try {
            const response = await fetch('/api/mood_data/{{ current_user }}');
            const data = await response.json();

            const ctx = document.getElementById('moodChart').getContext('2d');
            
            if (window.myChart) { window.myChart.destroy(); }

            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'Mood Score',
                        data: data.data,
                        borderColor: '#00D4FF',
                        backgroundColor: 'rgba(0, 212, 255, 0.1)',
                        borderWidth: 3,
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { min: 1, max: 5, ticks: { stepSize: 1 } }
                    }
                }
            });
        } catch (error) {
            console.error('Error loading chart:', error);
        }
    }

    // 2. The function to save a new mood
    async function saveMood() {
        const score = document.getElementById('moodScore').value;
        const thought = document.getElementById('thoughtText').value;

        try {
            const response = await fetch('/api/log_mood', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: '{{ current_user }}', // Updated from student_id
                    mood_score: parseInt(score), 
                    thought_text: thought 
                })
            });

            const result = await response.json();
            if (result.status === 'success') {
                document.getElementById('thoughtText').value = '';
                loadChart(); // This calls the function above to refresh the graph
            }
        } catch (error) {
            console.error('Connection failed:', error);
        }
    }

    // 3. Run this automatically when the page loads
    document.addEventListener('DOMContentLoaded', loadChart);
</script>
{% endblock %}
