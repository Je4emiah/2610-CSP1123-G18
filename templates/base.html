<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMetric | {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <nav class="navbar navbar-expand-lg border-bottom shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">MindMetric</a>
            <div class="ms-auto d-flex align-items-center">
                <a class="nav-link px-3" href="{{ url_for('index') }}">Home</a>
                <a class="nav-link px-3" href="{{ url_for('dashboard') }}">Dashboard</a>

                <div class="ms-2">
                    {% if current_user %}
                    <div class="dropdown">
                        <button class="btn btn-outline-primary dropdown-toggle rounded-pill" type="button"
                            data-bs-toggle="dropdown">
                            Hi, {{ current_user }}
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <button class="dropdown-item" id="themeToggle">
                                    <span id="themeIcon">🌙</span> Switch Theme
                                </button>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="{{ url_for('logout') }}">Logout</a></li>
                        </ul>
                    </div>
                    {% else %}
                    <a href="{{ url_for('login') }}" class="btn btn-primary rounded-pill px-4">Sign In</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
