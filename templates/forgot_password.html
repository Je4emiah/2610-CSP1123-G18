{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="login-body">
    <div class="login-card">
        <h2 class="text-center mb-4 fw-bold">Reset Password</h2>
        
        {% if not user_found %}
        <p class="text-muted text-center mb-4">Enter your username to verify your account.</p>
        <form action="{{ url_for('forgot_password') }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="e.g. Dev123" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill mb-3">Check Account</button>
        </form>

        {% else %}
        <p class="text-success text-center mb-4">Account verified for <strong>{{ username }}</strong></p>
        <form action="{{ url_for('reset_password') }}" method="POST">
            <input type="hidden" name="username" value="{{ username }}">
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" name="new_password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2 rounded-pill mb-3">Update Password</button>
        </form>
        {% endif %}

        <div class="text-center">
            <a href="{{ url_for('login') }}" class="text-decoration-none small">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
