{% extends "base.html" %}
{% block content %}
<div class="login-body">
    <div class="login-card">
        <h2 class="text-center mb-4 fw-bold">Reset Password</h2>

        {% if not user_found %}
        <form action="{{ url_for('forgot_password') }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            
            <p class="text-muted small fw-bold">Verify Identity:</p>
            <div class="mb-2">
                <label class="small">1. First pet's name?</label>
                <input type="text" name="q1" class="form-control form-control-sm" required>
            </div>
            <div class="mb-2">
                <label class="small">2. Mother's maiden name?</label>
                <input type="text" name="q2" class="form-control form-control-sm" required>
            </div>
            <div class="mb-3">
                <label class="small">3. Primary school name?</label>
                <input type="text" name="q3" class="form-control form-control-sm" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 rounded-pill">Verify Me</button>
        </form>

        {% else %}
        <form action="{{ url_for('reset_password') }}" method="POST">
            <input type="hidden" name="username" value="{{ username }}">
            <div class="mb-3">
                <label>New Password</label>
                <input type="password" name="new_password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100 rounded-pill">Update Password</button>
        </form>
        {% endif %}
    </div>
</div>
{% endblock %}
