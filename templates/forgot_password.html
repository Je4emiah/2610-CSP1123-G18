{% extends "base.html" %}
{% block content %}
<div class="login-body d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="login-card p-4 shadow-lg bg-white rounded" style="width: 400px;">
        <h3 class="text-center mb-4">Security Verification</h3>

        {% if not user_found %}
        <form action="{{ url_for('forgot_password') }}" method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Username</label>
                <input type="text" name="username" class="form-control" required placeholder="Enter your username">
            </div>

            <p class="text-muted small border-bottom pb-1">Answer your security questions:</p>
            
            <div class="mb-2">
                <label class="small">First pet's name?</label>
                <input type="text" name="q1" class="form-control" required>
            </div>
            <div class="mb-2">
                <label class="small">Mother's maiden name?</label>
                <input type="text" name="q2" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="small">Primary school?</label>
                <input type="text" name="q3" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill">Verify Identity</button>
        </form>

        {% else %}
        <form action="{{ url_for('reset_password') }}" method="POST">
            <input type="hidden" name="username" value="{{ username }}">
            <div class="mb-3">
                <label class="fw-bold">New Password</label>
                <input type="password" name="new_password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="fw-bold">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100 rounded-pill">Update Password</button>
        </form>
        {% endif %}
    </div>
</div>
{% endblock %}
