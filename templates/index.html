<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>MindMetric | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">MindMetric</a>
            <div class="ms-auto d-flex align-items-center">
                <a class="nav-link px-3" href="{{ url_for('index') }}">Home</a>
                <a class="nav-link px-3" href="{{ url_for('dashboard') }}">Dashboard</a>
                <div class="ms-auto">
                    {% if user %}
                    <div class="dropdown">
                        <button class="btn btn-outline-primary dropdown-toggle rounded-pill" type="button"
                            data-bs-toggle="dropdown">
                            Hi, {{ user }}
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#">Profile Settings</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="{{ url_for('logout') }}">Logout</a></li>
                        </ul>
                    </div>
                    {% else %}
                    <a href="{{ url_for('login') }}" class="btn btn-primary rounded-pill">Sign In</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
    <section class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Track Your Mind, <span style="color: #00D4FF;">Metric by Metric.</span></h1>
            <p class="lead text-muted mb-4">A simple way for MMU students to monitor emotional trends.</p>
            <a href="{{ url_for('login') }}" class="btn btn-dark btn-lg px-5 rounded-pill">Get Started</a>
        </div>
    </section>
</body>

</html>
