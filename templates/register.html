<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MindMetric | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="login-body">
    <div class="login-card">
        <h2 class="text-center mb-4 fw-bold">Register</h2>
        <form action="{{ url_for('register') }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill mb-3">Create Account</button>
            <div class="text-center mt-3">
                <a href="{{ url_for('index') }}" class="text-decoration-none small text-muted">← Back to Home</a>
            </div>
        </form>
    </div>
</body>

</html>
