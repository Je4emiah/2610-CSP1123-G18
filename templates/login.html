<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>MindMetric | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body class="login-body">
    <div class="login-card">
        <h2 class="text-center mb-4 fw-bold">Sign In</h2>
        <form action="{{ url_for('login') }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill mb-3">Sign In</button>
            <div class="text-center mb-3">
                <span class="text-muted small">or</span>
            </div>
            <a href="{{ url_for('register') }}" class="btn btn-outline-dark w-100 py-2 rounded-pill">Create Account</a>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('index') }}" class="text-decoration-none small text-muted">← Back to Home</a>
        </div>
    </div>
</body>

</html>
